services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GEMINI_VISION_MODEL: ${GEMINI_VISION_MODEL:-gemini-1.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      VISION_MODEL: ${VISION_MODEL:-gpt-4o-mini}
      TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER:-local}
      WHISPER_LOCAL_MODEL: ${WHISPER_LOCAL_MODEL:-tiny}
      DATABASE_URL: sqlite+aiosqlite:///./data/vidiq.db
      MEDIA_DIR: ./data/media
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - backend_data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
